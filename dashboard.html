<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- title and logo  -->
    <title>Github Issue Tracker</title>
    <link rel="shortcut icon" href="./assets/favicon.png" type="image/x-icon">

    <!-- font awesome cdn link  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- tailwindcss and daisy ui  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google fonts  -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap');


        .geist-font {
            font-family: "Geist", sans-serif;
        }
    </style>

</head>

<body class="geist-font bg-base-300 ">

<head class="">
    <div class="navbar bg-base-100 shadow-sm ">
  <div class="flex-1">
    <a href="#" class="btn btn-ghost btn-ghost text-lg md:text-xl"><img src="./assets/github-logo.png" alt="" class="w-2/10 md:w-1/10"> GitHub Issues Tracker</a>
  </div>
  <div class="flex flex-col lg:flex-row gap-2 lg:pr-18">
    <label class="input max-w-28 lg:max-w-md">
  <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <g
      stroke-linejoin="round"
      stroke-linecap="round"
      stroke-width="2.5"
      fill="none"
      stroke="currentColor"
    >
      <circle cx="11" cy="11" r="8"></circle>
      <path d="m21 21-4.3-4.3"></path>
    </g>
  </svg>
  <input id="search" type="search" required placeholder="Search issues..." />
</label>
    <!-- <input type="text" placeholder="Search issues..." class="input input-bordered w-24 md:w-auto" /> -->
    <button id="search-btn" class="btn btn-primary">Search</button>
  </div>
</div>
</head>

<main class="bg-base-2=300 max-w-7xl mx-auto">
    <div id="status-btn" class="p-6 bg-white b flex gap-5 mb-4">
        <button id="all-btn" onclick="LoadData()" class="btn btn-soft btn-primary btn-active">All</button>
        <button id="open-btn" class="btn btn-soft btn-primary">Open</button>
        <button id="closed-btn" class="btn btn-soft btn-primary">Closed</button>
    </div>

   <div class="p-6 bg-white flex gap-4 border-b border-gray-300">
    <div class="w-12 h-12 flex items-center justify-center rounded-full bg-base-300">
        <img src="./assets/Aperture.png" alt="">
    </div>
    <div>
        <h1 class="text-xl font-semibold"><span id="total-issue">0</span> Issues</h1>
        <p class="text-gray-500">Track and manage your project issues</p>
    </div>
    <div class=" ml-auto flex items-center gap-2">
        <div class="w-3 h-3 bg-green-600 rounded-full"></div> 
        <p>Open</p> &nbsp;&nbsp;
        <div class="w-3 h-3 bg-purple-500 rounded-full"></div>
        <p>Closed</p>
    </div>
   </div>


   <div id="spinner" class="flex justify-center items-center p-6 bg-base-100 hidden">
            <span class="loading loading-bars loading-xl"></span>

        </div >
   <!-- card container  -->
    <div id="issue-container" class="p-6 bg-base-100 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3">
        <!-- card will be load ed here  -->






    </div>
<!-- Open the modal using ID.showModal() method -->
<!-- <button class="btn" onclick="my_modal_1.showModal()">open modal</button> -->
<dialog id="my_modal_1" class="modal">
  <div class="modal-box">
    
    <div  id="issue-details"></div>
    
    <div class="modal-action">
      <form method="dialog">
        <!-- if there is a button in form, it will close the modal -->
        <button class="btn btn-primary">Close</button>
      </form>
    </div>
  </div>
</dialog>

</main>

<script src="script/dashboard.js"></script>
</body>

</html>
